<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1b2a; font-family: 'Inter', -apple-system, sans-serif; color: #e0e6ed; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@500;600&display=swap');
  #root { min-height: 100vh; }
</style>
<script type="text/babel">
const { useState, useRef, useCallback } = React;

// Role layouts differ by group. Intake = presort/floor; Day sort = sorting operation.
const ROLE_SETS = {
  intake: [
    { id: 'infeed',   group: 'Pre sort',  label: 'Infeed',             cap: 12, accent: '#4cc9f0' },
    { id: 'magnum',   group: 'Pre sort',  label: 'Magnum filler',      cap: 6,  accent: '#4cc9f0' },
    { id: 'outfeed',  group: 'Pre sort',  label: 'Outfeed',            cap: 5,  accent: '#4cc9f0' },
    { id: 'vinted',   group: 'Pre sort',  label: 'Vinted Relabelling', cap: 4,  accent: '#4cc9f0' },
    { id: 'bays',     group: 'Floor',     label: 'Bays',               cap: 2,  accent: '#f9844a' },
    { id: 'aisle',    group: 'Floor',     label: 'Aisle Sweep',        cap: 1,  accent: '#f9844a' },
    { id: 'intercity',group: 'Floor',     label: 'Intercity',          cap: 2,  accent: '#90be6d' },
    { id: 'boxscan',  group: 'Floor',     label: 'Box scanning',       cap: 2,  accent: '#90be6d' },
    { id: 'noshow',   group: 'Other',     label: 'No Shows',           cap: 99, accent: '#e07a5f' },
  ],
  daysort: [
    { id: 'sorting',  group: 'Day sort',  label: 'Sorting',            cap: 12, accent: '#4cc9f0' },
    { id: 'floaters', group: 'Day sort',  label: 'Floaters',           cap: 4,  accent: '#f9844a' },
    { id: 'stagers',  group: 'Day sort',  label: 'Stagers',            cap: 3,  accent: '#90be6d' },
    { id: 'loaders',  group: 'Day sort',  label: 'Loaders',            cap: 3,  accent: '#f9c74f' },
    { id: 'noshow',   group: 'Other',     label: 'No Shows',           cap: 99, accent: '#e07a5f' },
  ],
};

const PRIORITY = {
  intake:  ['infeed','magnum','outfeed','bays','aisle','intercity','boxscan','vinted','noshow'],
  daysort: ['sorting','floaters','stagers','loaders','noshow'],
};

const rolesFor  = (g) => ROLE_SETS[g] || ROLE_SETS.intake;
const roleById  = (g, id) => rolesFor(g).find(r => r.id === id) || { label: id };

function App() {
  const [people, setPeople] = useState([]); // {id, name, role}
  const [loaded, setLoaded] = useState(false);
  const [dragName, setDragName] = useState(null);
  const [slotFilter, setSlotFilter] = useState('all');
  const [groupFilter, setGroupFilter] = useState('daysort');
  const fileRef = useRef();

  const allocate = (list) => {
    // Fill roles by priority independently within each group + time slot.
    const buckets = {};
    list.forEach(p => { const k = p.group + '|' + p.slot; (buckets[k] = buckets[k] || []).push(p); });

    const out = [];
    Object.keys(buckets).sort().forEach(k => {
      const grp = buckets[k][0].group;
      const roles = rolesFor(grp);
      const order = PRIORITY[grp] || PRIORITY.intake;
      const caps = {};
      roles.forEach(r => caps[r.id] = r.cap);
      const filled = {};
      roles.forEach(r => filled[r.id] = 0);
      buckets[k].forEach(p => {
        let assigned = 'noshow';
        for (const rid of order) {
          if (filled[rid] < caps[rid]) { assigned = rid; filled[rid]++; break; }
        }
        out.push({ ...p, role: assigned });
      });
    });
    return out;
  };

  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    Papa.parse(file, {
      header: true,
      skipEmptyLines: true,
      complete: (res) => {
        // Keep only intake shifts.
        const intake = res.data.filter(r => (r['Shift type'] || '').trim().toLowerCase() === 'intake');

        const fmt = (iso) => {
          // Export times are UTC; display as UK local by adding 1 hour.
          const m = (iso || '').match(/T(\d{2}):(\d{2})/);
          if (!m) return '';
          const adj = ((parseInt(m[1], 10) + 1) % 24);
          return `${String(adj).padStart(2,'0')}:${m[2]}`;
        };
        const toMin = (hhmm) => {
          const [h, m] = hhmm.split(':').map(Number);
          return h * 60 + m;
        };
        const toHHMM = (min) => {
          min = ((min % 1440) + 1440) % 1440;
          return `${String(Math.floor(min / 60)).padStart(2,'0')}:${String(min % 60).padStart(2,'0')}`;
        };
        const breakWindow = (startMin, endMin) => {
          const mid = Math.round((startMin + endMin) / 2);
          return `${toHHMM(mid - 15)}–${toHHMM(mid + 15)}`; // 30-min break, centred on midpoint
        };

        const list = intake.map((r, i) => {
          const fn = (r['First name'] || '').trim();
          const ln = (r['Last name'] || '').trim();
          const start = fmt(r['Planned starts at'] || r['Starts at']);
          const end = fmt(r['Planned ends at'] || r['Ends at']);
          // Day sort = 06:00 local start; everything else is regular intake.
          const group = start === '06:00' ? 'daysort' : 'intake';
          return {
            id: 'p' + i + '-' + Date.now(),
            name: [fn, ln].filter(Boolean).join(' '),
            group,
            slot: `${start}–${end}`,
            start, end,
            brk: (start && end) ? breakWindow(toMin(start), toMin(end)) : '',
            status: (r['Status'] || '').trim(),
          };
        }).filter(p => p.name);

        setPeople(allocate(list));
        setLoaded(true);
      }
    });
  };

  const reassign = (personId, newRole) => {
    setPeople(p => p.map(x => x.id === personId ? { ...x, role: newRole } : x));
  };

  const removePerson = (id) => setPeople(p => p.filter(x => x.id !== id));

  const renamePerson = (id, name) => setPeople(p => p.map(x => x.id === id ? { ...x, name } : x));

  const setBreak = (id, brk) => setPeople(p => p.map(x => x.id === id ? { ...x, brk } : x));

  const setSlotBreak = (group, slot, brk) =>
    setPeople(p => p.map(x => (x.group === group && x.slot === slot) ? { ...x, brk } : x));

  const addBlank = () => {
    const name = prompt('Operative name?');
    if (name && name.trim()) {
      const slot = slotFilter !== 'all' ? slotFilter : '';
      setPeople(p => [...p, { id: 'p' + Date.now(), name: name.trim(), role: 'noshow',
        group: groupFilter, slot, start: '', end: '', brk: '', status: 'manual' }]);
    }
  };

  const exportCsv = () => {
    const rows = [['Name','Role','Time slot','Break']].concat(
      people.map(p => [p.name, roleById(p.group, p.role).label, p.slot || '', p.brk || ''])
    );
    const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'UB11_intake_allocation.csv';
    a.click();
  };

  const inGroup = people.filter(p => p.group === groupFilter);
  const slots = Array.from(new Set(inGroup.map(p => p.slot).filter(Boolean))).sort();
  const visible = slotFilter === 'all' ? inGroup : inGroup.filter(p => p.slot === slotFilter);
  const byRole = (rid) => visible.filter(p => p.role === rid);
  const groupCount = (g) => people.filter(p => p.group === g).length;

  return (
    <div style={{ maxWidth: 1400, margin: '0 auto', padding: '32px 28px' }}>
      <header style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end',
        borderBottom:'1px solid #1d3557', paddingBottom: 20, marginBottom: 28, flexWrap:'wrap', gap: 16 }}>
        <div>
          <div style={{ fontFamily:'Roboto Mono', fontSize: 12, letterSpacing: 3, color:'#4cc9f0', textTransform:'uppercase' }}>UB11 · Sortation Floor</div>
          <h1 style={{ fontSize: 30, fontWeight: 700, marginTop: 4 }}>Shift Allocation</h1>
        </div>
        <div style={{ display:'flex', gap: 10, flexWrap:'wrap' }}>
          <input ref={fileRef} type="file" accept=".csv" onChange={handleFile} style={{ display:'none' }} />
          <Btn onClick={() => fileRef.current.click()} primary>Upload shift export</Btn>
          {loaded && <Btn onClick={addBlank}>Add operative</Btn>}
          {loaded && <Btn onClick={exportCsv}>Export allocation</Btn>}
        </div>
      </header>

      {!loaded ? (
        <Empty onClick={() => fileRef.current.click()} />
      ) : (
        <>
          <Summary people={visible} />
          <div style={{ display:'flex', gap: 8, marginTop: 20 }}>
            <GroupTab label={`Day sort (${groupCount('daysort')})`} active={groupFilter==='daysort'}
              onClick={() => { setGroupFilter('daysort'); setSlotFilter('all'); }} />
            <GroupTab label={`Intake (${groupCount('intake')})`} active={groupFilter==='intake'}
              onClick={() => { setGroupFilter('intake'); setSlotFilter('all'); }} />
          </div>
          <div style={{ display:'flex', gap: 8, flexWrap:'wrap', marginTop: 16, alignItems:'center' }}>
            <span style={{ fontSize: 11, textTransform:'uppercase', letterSpacing: 1.5, color:'#5d7896', marginRight: 4 }}>Time slot</span>
            <SlotChip label={`All (${inGroup.length})`} active={slotFilter==='all'} onClick={() => setSlotFilter('all')} />
            {slots.map(s => (
              <SlotChip key={s} label={`${s} · ${inGroup.filter(p=>p.slot===s).length}`}
                active={slotFilter===s} onClick={() => setSlotFilter(s)} />
            ))}
          </div>
          {slotFilter !== 'all' && (
            <SlotBreakBar group={groupFilter} slot={slotFilter}
              current={(inGroup.find(p => p.slot === slotFilter) || {}).brk || ''}
              onApply={(brk) => setSlotBreak(groupFilter, slotFilter, brk)} />
          )}
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(260px, 1fr))', gap: 18, marginTop: 20 }}>
            {rolesFor(groupFilter).map(r => (
              <RoleCard key={r.id} role={r} group={groupFilter} people={byRole(r.id)}
                onDrop={(pid) => reassign(pid, r.id)}
                onRemove={removePerson}
                onRename={renamePerson}
                onBreak={setBreak}
                reassign={reassign}
                dragName={dragName} setDragName={setDragName} />
            ))}
          </div>
        </>
      )}
    </div>
  );
}

function Summary({ people }) {
  const total = people.length;
  const noshow = people.filter(p => p.role === 'noshow').length;
  const placed = total - noshow;
  return (
    <div style={{ display:'flex', gap: 14, flexWrap:'wrap' }}>
      <Stat label="Total roster" value={total} />
      <Stat label="Placed" value={placed} accent="#90be6d" />
      <Stat label="No shows" value={noshow} accent="#e07a5f" />
    </div>
  );
}

function Stat({ label, value, accent='#4cc9f0' }) {
  return (
    <div style={{ background:'#102a43', border:'1px solid #1d3557', borderRadius: 10, padding:'14px 20px', minWidth: 130 }}>
      <div style={{ fontFamily:'Roboto Mono', fontSize: 28, fontWeight: 600, color: accent }}>{value}</div>
      <div style={{ fontSize: 11, textTransform:'uppercase', letterSpacing: 1.5, color:'#8da9c4', marginTop: 2 }}>{label}</div>
    </div>
  );
}

function RoleCard({ role, group, people, onDrop, onRemove, onRename, onBreak, reassign, dragName, setDragName }) {
  const [over, setOver] = useState(false);
  const isFull = role.id !== 'noshow' && people.length >= role.cap;
  const capLabel = role.id === 'noshow' ? people.length : `${people.length}/${role.cap}`;
  return (
    <div
      onDragOver={(e) => { e.preventDefault(); setOver(true); }}
      onDragLeave={() => setOver(false)}
      onDrop={(e) => { e.preventDefault(); setOver(false); if (dragName) { onDrop(dragName); setDragName(null); } }}
      style={{ background:'#102a43', border: `1px solid ${over ? role.accent : '#1d3557'}`,
        borderRadius: 12, padding: 16, transition:'border-color .15s',
        boxShadow: over ? `0 0 0 2px ${role.accent}40` : 'none' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom: 12 }}>
        <div>
          <div style={{ fontSize: 10, textTransform:'uppercase', letterSpacing: 1.5, color:'#5d7896' }}>{role.group}</div>
          <div style={{ fontSize: 16, fontWeight: 600, color: role.accent }}>{role.label}</div>
        </div>
        <div style={{ fontFamily:'Roboto Mono', fontSize: 13, fontWeight: 600,
          color: isFull ? '#e07a5f' : '#8da9c4' }}>{capLabel}</div>
      </div>
      <div style={{ display:'flex', flexDirection:'column', gap: 6, minHeight: 30 }}>
        {people.length === 0 && <div style={{ fontSize: 12, color:'#456585', fontStyle:'italic', padding:'4px 0' }}>Drop an operative here</div>}
        {people.map(p => (
          <NameCard key={p.id} p={p} group={group} onRemove={onRemove} onRename={onRename} onBreak={onBreak}
            reassign={reassign} setDragName={setDragName} />
        ))}
      </div>
    </div>
  );
}

function NameCard({ p, group, onRemove, onRename, onBreak, reassign, setDragName }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(p.name);
  const [editBrk, setEditBrk] = useState(false);
  const [brkDraft, setBrkDraft] = useState(p.brk || '');

  const commit = () => {
    const v = draft.trim();
    onRename(p.id, v || p.name);
    if (!v) setDraft(p.name);
    setEditing(false);
  };

  const commitBrk = () => {
    onBreak(p.id, brkDraft.trim());
    setEditBrk(false);
  };

  return (
    <div draggable={!editing}
      onDragStart={() => setDragName(p.id)}
      style={{ background:'#0d1b2a', border:'1px solid #1d3557', borderRadius: 7,
        padding:'7px 10px', cursor: editing ? 'text' : 'grab', fontSize: 13 }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        {editing ? (
          <input autoFocus value={draft}
            onChange={(e) => setDraft(e.target.value)}
            onBlur={commit}
            onKeyDown={(e) => { if (e.key === 'Enter') commit(); if (e.key === 'Escape') { setDraft(p.name); setEditing(false); } }}
            style={{ flex: 1, background:'#102a43', color:'#e0e6ed', border:'1px solid #4cc9f0',
              borderRadius: 5, fontSize: 13, padding:'2px 6px', fontFamily:'inherit', marginRight: 6 }} />
        ) : (
          <span onClick={() => setEditing(true)} title="Click to rename"
            style={{ flex: 1, cursor:'text' }}>{p.name}</span>
        )}
        <div style={{ display:'flex', gap: 6, alignItems:'center' }}>
          <select value={p.role} onChange={(e) => reassign(p.id, e.target.value)}
            style={{ background:'#102a43', color:'#8da9c4', border:'1px solid #1d3557',
              borderRadius: 5, fontSize: 11, padding:'2px 4px' }}>
            {rolesFor(group).map(r => <option key={r.id} value={r.id}>{r.label}</option>)}
          </select>
          <span onClick={() => onRemove(p.id)} style={{ cursor:'pointer', color:'#5d7896', fontSize: 16, lineHeight: 1 }}>×</span>
        </div>
      </div>
      <div style={{ display:'flex', gap: 10, marginTop: 4, fontFamily:'Roboto Mono', fontSize: 10.5, color:'#5d7896', alignItems:'center' }}>
        {p.slot && <span>{p.slot}</span>}
        {editBrk ? (
          <input autoFocus value={brkDraft}
            onChange={(e) => setBrkDraft(e.target.value)}
            onBlur={commitBrk}
            onKeyDown={(e) => { if (e.key === 'Enter') commitBrk(); if (e.key === 'Escape') { setBrkDraft(p.brk || ''); setEditBrk(false); } }}
            placeholder="e.g. 10:00–10:30"
            style={{ width: 110, background:'#102a43', color:'#f9c74f', border:'1px solid #f9c74f',
              borderRadius: 4, fontSize: 10.5, padding:'1px 5px', fontFamily:'Roboto Mono' }} />
        ) : (
          <span onClick={() => { setBrkDraft(p.brk || ''); setEditBrk(true); }}
            title="Click to edit break"
            style={{ color:'#f9c74f', cursor:'text' }}>
            {p.brk ? `break ${p.brk}` : '+ set break'}
          </span>
        )}
      </div>
    </div>
  );
}

function SlotBreakBar({ slot, current, onApply }) {
  const [val, setVal] = useState(current);
  React.useEffect(() => { setVal(current); }, [current, slot]);
  return (
    <div style={{ display:'flex', alignItems:'center', gap: 10, marginTop: 14,
      background:'#102a43', border:'1px solid #1d3557', borderRadius: 8, padding:'10px 14px' }}>
      <span style={{ fontSize: 12, color:'#8da9c4' }}>Break for everyone in {slot}:</span>
      <input value={val} onChange={(e) => setVal(e.target.value)}
        onKeyDown={(e) => { if (e.key === 'Enter') onApply(val.trim()); }}
        placeholder="e.g. 10:00–10:30"
        style={{ background:'#0d1b2a', color:'#f9c74f', border:'1px solid #f9c74f',
          borderRadius: 5, fontSize: 12, padding:'4px 8px', fontFamily:'Roboto Mono', width: 130 }} />
      <button onClick={() => onApply(val.trim())} style={{
        background:'#f9c74f', color:'#0d1b2a', border:'none', borderRadius: 6,
        padding:'5px 12px', fontSize: 12, fontWeight: 600, cursor:'pointer', fontFamily:'inherit' }}>
        Apply to slot
      </button>
    </div>
  );
}

function GroupTab({ label, active, onClick }) {
  return (
    <button onClick={onClick} style={{
      background: active ? '#1d3557' : 'transparent',
      color: active ? '#e0e6ed' : '#5d7896',
      border: `1px solid ${active ? '#4cc9f0' : '#1d3557'}`,
      borderRadius: 8, padding:'8px 18px', fontSize: 14, fontWeight: 600,
      cursor:'pointer', fontFamily:'inherit' }}>
      {label}
    </button>
  );
}

function SlotChip({ label, active, onClick }) {
  return (
    <button onClick={onClick} style={{
      background: active ? '#4cc9f0' : '#102a43',
      color: active ? '#0d1b2a' : '#8da9c4',
      border: `1px solid ${active ? '#4cc9f0' : '#1d3557'}`,
      borderRadius: 7, padding:'6px 12px', fontSize: 12, fontWeight: 600,
      cursor:'pointer', fontFamily:'Roboto Mono' }}>
      {label}
    </button>
  );
}

function Btn({ children, onClick, primary }) {
  return (
    <button onClick={onClick} style={{
      background: primary ? '#4cc9f0' : 'transparent',
      color: primary ? '#0d1b2a' : '#4cc9f0',
      border: `1px solid #4cc9f0`, borderRadius: 8, padding:'9px 16px',
      fontSize: 13, fontWeight: 600, cursor:'pointer', fontFamily:'inherit' }}>
      {children}
    </button>
  );
}

function Empty({ onClick }) {
  return (
    <div onClick={onClick} style={{ border:'2px dashed #1d3557', borderRadius: 14,
      padding:'70px 20px', textAlign:'center', cursor:'pointer', background:'#102a4380' }}>
      <div style={{ fontSize: 17, fontWeight: 600, marginBottom: 8 }}>Upload a roster to begin</div>
      <div style={{ fontSize: 13, color:'#8da9c4', lineHeight: 1.6 }}>
        Upload the shift booking export. Only <strong>intake</strong> shifts are kept.<br/>
        Operatives are grouped by their booked time slot, then auto-filled<br/>
        Infeed → Magnum → Outfeed → Bays → Aisle → Intercity → Box scanning → Vinted.<br/>
        Each slot gets a 30-min break centred on its midpoint. Overflow lands in No Shows.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
